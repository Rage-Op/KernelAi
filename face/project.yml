name: Kernel
options:
  bundleIdPrefix: com.kernel
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    # No code-signing identity is provisioned in this build environment.
    # The compile-verify gate (xcodebuild build) runs with signing disabled;
    # the owner's signed local build supplies the stable Developer-ID identity
    # that gives TCC permanence (Pitfall 4). Bundle id stays stable regardless.
    PRODUCT_BUNDLE_IDENTIFIER: com.kernel.face
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"

targets:
  Kernel:
    type: application
    platform: macOS
    sources:
      - path: Kernel
      - path: Spike
    info:
      path: Kernel/Info.plist
      properties:
        CFBundleDisplayName: Kernel
        CFBundleName: Kernel
        # Menubar-only agent: no Dock icon, no main window at launch.
        LSUIElement: true
        # Declared from the FIRST build so the TCC identity is stable even
        # though the boundary spike itself does not need the mic (Pitfall 4).
        NSMicrophoneUsageDescription: "KERNEL listens for your voice so you can talk to it directly."
        # Push-to-talk uses Apple's on-device speech recognition (no audio leaves the machine).
        NSSpeechRecognitionUsageDescription: "KERNEL transcribes your held-to-talk speech on-device so you can speak instead of type."
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Kernel/Kernel.entitlements
        ENABLE_HARDENED_RUNTIME: true
        # Non-sandboxed Developer-ID app (RESEARCH Open Question 4): avoids
        # UDS/mic sandbox exceptions; not destined for the Mac App Store.
        ENABLE_APP_SANDBOX: false
    postBuildScripts:
      # Keep the daemon's compiled dist/ fresh on every app build so a Cmd+R run launches CURRENT
      # daemon code (the DaemonSupervisor spawns the repo daemon when none is running). Best-effort:
      # if node/npm aren't on PATH the build still succeeds and the app falls back to whatever dist/
      # already exists. Set KERNEL_EMBED_NODE_MODULES=1 to ALSO copy the full daemon (dist +
      # node_modules + manifest + launcher) into the .app for a self-contained, distributable bundle.
      - name: "Build & (optionally) embed KERNEL daemon"
        basedOnDependencyAnalysis: false
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          DAEMON_SRC="${SRCROOT}/../daemon"
          if command -v npm >/dev/null 2>&1; then
            ( cd "$DAEMON_SRC" && npm run build ) || echo "warning: daemon build failed; using existing dist/"
          else
            echo "warning: npm not on PATH; skipping daemon build (runtime uses existing dist/)"
          fi
          if [ "${KERNEL_EMBED_NODE_MODULES:-0}" = "1" ]; then
            DEST="${BUILT_PRODUCTS_DIR}/${UNLOCKED_RESOURCES_FOLDER_PATH}/daemon"
            mkdir -p "$DEST"
            rsync -a --delete "$DAEMON_SRC/dist/" "$DEST/dist/" || true
            rsync -a "$DAEMON_SRC/node_modules/" "$DEST/node_modules/" || true
            cp "$DAEMON_SRC/package.json" "$DEST/package.json" || true
            cp "${SRCROOT}/../launchd/kernel-launch.sh" "$DEST/kernel-launch.sh" 2>/dev/null || true
            echo "embedded full daemon → $DEST"
          fi

  KernelTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KernelTests
    dependencies:
      - target: Kernel
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Kernel.app/Contents/MacOS/Kernel"
        # The unit-test bundle has no checked-in Info.plist; let Xcode synthesize one so the
        # bundle can be signed and the test host can load it (otherwise `xcodebuild test` fails
        # at the code-sign step before any test runs).
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.kernel.faceTests

schemes:
  Kernel:
    build:
      targets:
        Kernel: all
        KernelTests: [test]
    test:
      targets:
        - KernelTests
      gatherCoverageData: false
