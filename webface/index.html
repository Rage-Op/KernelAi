<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="referrer" content="no-referrer" />
    <title>KERNEL</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Boot gate: held until the model reports ready -->
    <div id="boot" class="boot">
      <div class="boot-card">
        <div class="boot-orb" aria-hidden="true"></div>
        <div class="boot-title">KERNEL</div>
        <div id="boot-status" class="boot-status">Connecting to the daemon…</div>
        <div id="boot-detail" class="boot-detail"></div>
      </div>
    </div>

    <div id="app" class="app hidden">
      <!-- Left nav rail -->
      <nav class="rail">
        <div class="rail-brand" title="KERNEL">◐</div>
        <button class="rail-tab is-active" data-view="chat" title="Chat">💬<span>Chat</span></button>
        <button class="rail-tab" data-view="browser" title="Browser">🌐<span>Browser</span></button>
        <button class="rail-tab" data-view="settings" title="Settings">⚙<span>Settings</span></button>
        <div class="rail-spacer"></div>
        <div id="rail-conn" class="rail-conn" title="Connection">●</div>
      </nav>

      <!-- Main column -->
      <main class="main">
        <header id="status-header" class="status-header"><!-- StatusHeader renders here --></header>
        <section id="view-chat" class="view view-chat">
          <div id="chat-scroll" class="chat-scroll"><div id="chat-list" class="chat-list"></div></div>
          <form id="composer" class="composer" autocomplete="off">
            <textarea id="composer-input" class="composer-input" rows="1"
              placeholder="Message KERNEL…  (Enter to send, Shift+Enter for newline)"></textarea>
            <button id="composer-send" class="composer-send" type="submit">Send</button>
          </form>
        </section>

        <section id="view-browser" class="view view-browser hidden">
          <div class="browser-bar">
            <span class="browser-dot" id="browser-dot"></span>
            <span id="browser-url" class="browser-url">No page loaded</span>
          </div>
          <div class="browser-stage">
            <img id="browser-img" class="browser-img hidden" alt="Live browser view" />
            <div id="browser-idle" class="browser-idle">
              The live browser view appears here when KERNEL uses the web.<br />
              A real Chromium window also opens on this Mac for logins / 2FA.
            </div>
          </div>
        </section>

        <section id="view-settings" class="view view-settings hidden"><!-- Settings renders here --></section>
      </main>
    </div>

    <script type="module" src="./assets/main.js"></script>
  </body>
</html>
